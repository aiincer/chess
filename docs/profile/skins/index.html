<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aussehen</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="../../src/img/logo.png">
</head>
<body>

    <div id="topbar"></div>

    <div class="container">

        <div class="content">

            <div class="card">
                <h2>Brett</h2>

                <div id="boardPreview">
                    <!-- Das Brett kommt später hier hinein -->
                </div>
            </div>
            <a  href="./sets">
                <div class="card">
                    <h2>Set</h2>
                    <img id="setIcon" alt="Figuren-Set" >
                    <h3 id="setName">Lädt...</h3>
                </div>
            </a>

        </div>

    </div>

    <script type="module">
        import { loadBar } from "../../api/bar.js";

        document.getElementById("topbar").innerHTML = loadBar("../..");

        // Session prüfen
        const session = sessionStorage.getItem("session-id");

        if (!session) {
            location.replace("../../login");
        }

        // Skin laden und direkt Icon-Pfad bauen
        function loadSkin() {

            const skinRaw = sessionStorage.getItem("skin");
            if (!skinRaw) return;

            let skin;
            try {
                skin = JSON.parse(skinRaw);
            } catch (e) {
                console.error("Skin ist kein gültiges JSON", e);
                return;
            }

            if (!skin.set) return;

            const setId = skin.set;

            const iconPath = `../../src/img/sets/${setId}/icon.png`;

            const icon = document.getElementById("setIcon");
            const name = document.getElementById("setName");

            icon.src = iconPath;

            name.textContent = setId;

        }

        loadSkin();

    </script>

</body>
</html>
