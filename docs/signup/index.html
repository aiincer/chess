<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Signup</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="topbar"></div>

  <div class="container">

    <form id="signupForm" class="card">
      <h1>Sign Up</h1>

      <input id="username" placeholder="Benutzername" required />
      <input id="password" type="password" placeholder="Passwort" required />

      <label class="checkbox">
        <input type="checkbox" id="privacy">
        Datenschutz akzeptieren
      </label>

      <button type="submit">Erstellen</button>
      <p id="msg"></p>
    </form>

  </div>

  <script type="module">
    const form = document.getElementById("signupForm");
    const msg = document.getElementById("msg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = username.value.trim();
      const passwort = password.value.trim();
      const privacy = document.getElementById("privacy").checked;

      if (!name || !passwort) {
        msg.textContent = "Felder fehlen";
        return;
      }

      if (!privacy) {
        msg.textContent = "Datenschutz fehlt";
        return;
      }

      try {
        // 1. Base URL holen
        const ip = await fetch("../api/ip.txt");
        const base = (await ip.text()).trim();

        // 2. Signup Request
        const signupRes = await fetch(base + "/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, passwort })
        });

        if (!signupRes.ok) {
          msg.textContent = "Signup fehlgeschlagen";
          return;
        }

        // 3. DIREKT LOGIN danach
        const loginRes = await fetch(base + "/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, passwort })
        });

        const data = await loginRes.json();

        if (!data.ok) {
          msg.textContent = "Auto-Login fehlgeschlagen";
          return;
        }

        // 4. Session speichern
        sessionStorage.setItem("session-id", data.session);

        msg.textContent = "Erstellt & eingeloggt!";

        // 5. Redirect
        setTimeout(() => {
          window.location.href = "../home";
        }, 600);

      } catch (err) {
        console.error(err);
        msg.textContent = "Server Fehler";
      }
    });
  </script>

  <!-- BAR -->
  <script type="module">
    import { loadBar } from "../api/bar.js";
    document.getElementById("topbar").innerHTML = loadBar("..");
  </script>

</body>
</html>
