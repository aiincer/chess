<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Signup</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="topbar"></div>

  <div class="container">

    <form id="signupForm" class="card">
      <h1>Sign Up</h1>

      <input id="username" placeholder="Benutzername" required />
      <input id="password" type="password" placeholder="Passwort" required />

      <label class="checkbox">
        <input type="checkbox" id="privacy">
        Datenschutz akzeptieren
      </label>

      <button type="submit">Erstellen</button>
      <p id="msg"></p>
    </form>

  </div>

  <script type="module">

    const form = document.getElementById("signupForm");
    const msg = document.getElementById("msg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = username.value.trim();
      const passwort = password.value.trim();
      const privacy = document.getElementById("privacy").checked;

      if (!name || !passwort) return msg.textContent = "Felder fehlen";
      if (!privacy) return msg.textContent = "Datenschutz fehlt";

      try {
        const ip = await fetch("./api/ip.txt");
        const base = (await ip.text()).trim();

        await fetch(base + "/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, passwort })
        });

        msg.textContent = "Erfolgreich erstellt!";
      } catch {
        msg.textContent = "Server Fehler";
      }
    });
  </script>
  <script type="module">
    import { loadBar } from "../api/bar.js";
    document.getElementById("topbar").innerHTML = loadBar();
  </script>
</body>
</html>
