<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Make</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
        }
        .loader {
            width: 50px;
            height: 50px;
            border: 6px solid #ddd;
            border-top: 6px solid #333;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
        #status {
            border-radius: 50%;
            background: orange;
        }
        #invite {
            position: absolute;
            bottom: 30px;
            display: flex;
            gap: 10px;
        }
        #inviteLink {
            width: 300px;
            padding: 10px;
            font-size: 16px;
        }
        #invite button {
            padding: 10px 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    
    <div id="status">
        <div class="loader"></div>
    </div>
    <div id="invite">
        <input id="inviteLink" readonly>
        <button onclick="copyInvite()">Kopieren</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const method = params.get("method");
        if (method === "link") {
            const script = document.createElement("script");
            script.src = "./link.js";
            document.body.appendChild(script);
        }
    </script>
    <script>
        function copyInvite() {
            const input = document.getElementById("inviteLink");
            navigator.clipboard.writeText(input.value);
        }
    </script>
</body>
</html>
