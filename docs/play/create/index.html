<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Spiel erstellen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="topbar"></div>

<div class="container">

    <div class="card">

        <h1>Spiel erstellen</h1>

        <div class="setting">
            <label id="extraLabel">gegner</label>
            <select id="opponent">
                <option>Lokal</option>
                <option>KI</option>
                <option>Freund</option>
                <option>Öffentlich</option>
                <option>Link</option>
            </select>
        </div>
        

        <div class="setting" id="extraSetting">
            <label id="extraLabel">Modell</label>
            <select id="extraSelect"></select>
        </div>

        <div class="setting">
            <label>Wertung</label>
            <select id="rated"></select>
        </div>

        <div class="setting">
            <label>Modus</label>
            <select id="mode">
                <option>standard</option>
            </select>
        </div>

        <div class="setting">
            <label>Zeit</label>
            <select id="time">
                <option>60:60</option>
                <option>30:30</option>
                <option>15:15</option>
                <option>10:10</option>
                <option>5:5</option>
                <option>2:2</option>
                <option>1:1</option>
            </select>
        </div>
        <div class="setting">
            <label>Farbe</label>
            <select id="color">
                <option value="random">Zufall</option>
                <option value="white">Weiß</option>
                <option value="black">Schwarz</option>
            </select>
        </div>

    </select>
        <button id="start">Spiel erstellen</button>

    </div>

</div>

<script type="module">
import { loadBar } from "../../api/bar.js";

document.getElementById("topbar").innerHTML = loadBar("..");

const session = sessionStorage.getItem("session-id");

if (!session) {
    location.href = "../../login";
}

const opponent = document.getElementById("opponent");
const extraSetting = document.getElementById("extraSetting");
const extraLabel = document.getElementById("extraLabel");
const extraSelect = document.getElementById("extraSelect");
const rated = document.getElementById("rated");
const startBtn = document.getElementById("start");

const mode = document.getElementById("mode");
const time = document.getElementById("time");
const color = document.getElementById("color");

let api = "";
let friendsLoaded = false;

async function init() {
    try {
        const ip = await fetch("../../api/ip.txt");
        api = (await ip.text()).trim();
    } catch {
        api = "";
    }

    updateMenu();
}

async function loadFriends() {
    extraSelect.innerHTML = "";

    if (!api) {
        extraSelect.innerHTML = "<option>Fehler beim Laden</option>";
        return;
    }

    try {
        const res = await fetch(
            api + "/friends?name=" + encodeURIComponent(session)
        );

        if (!res.ok) throw new Error();

        const data = await res.json();
        const friends = data.friends ?? data;

        if (!friends || friends.length === 0) {
            extraSelect.innerHTML = "<option>Keine Freunde</option>";
            return;
        }

        for (const friend of friends) {
            const option = document.createElement("option");
            option.value = friend;
            option.textContent = friend;
            extraSelect.appendChild(option);
        }

        friendsLoaded = true;

    } catch {
        extraSelect.innerHTML = "<option>Fehler beim Laden</option>";
    }
}

async function updateMenu() {
    const value = opponent.value;

    extraSelect.innerHTML = "";
    rated.disabled = false;

    for (const option of opponent.options) {
        option.disabled = option.value !== "Lokal";
    }

    // KI
    if (value === "KI") {

        extraSetting.style.display = "flex";
        extraLabel.textContent = "Modell";

        extraSelect.innerHTML = `
            <option value="standard">Standard</option>
        `;

        rated.innerHTML = `
            <option value="false">nicht gewertet</option>
        `;

        rated.disabled = true;
        return;
    }

    // Freund
    if (value === "Freund") {

        extraSetting.style.display = "flex";
        extraLabel.textContent = "Freund";

        rated.innerHTML = `
            <option value="true">gewertet</option>
            <option value="false">nicht gewertet</option>
        `;

        rated.disabled = false;

        await loadFriends();
        return;
    }

    // Lokal oder Link
    if (value === "Lokal" || value === "Link") {

        extraSetting.style.display = "none";

        rated.innerHTML = `
            <option value="false">nicht gewertet</option>
        `;

        rated.disabled = true;
        return;
    }

    // Öffentlich
    extraSetting.style.display = "none";

    rated.innerHTML = `
        <option value="true">gewertet</option>
        <option value="false">nicht gewertet</option>
    `;

    rated.disabled = false;
}

opponent.addEventListener("change", updateMenu);

init();

startBtn.onclick = () => {

    let selectedColor;

    switch (color.value) {
        case "white":
            selectedColor = 1;
            break;

        case "black":
            selectedColor = 0;
            break;

        default:
            selectedColor = Math.random() < 0.5 ? 1 : 0;
    }

    let gameDetails = {
        color: selectedColor,
        time: time.value,
        gameMode: mode.value
    };

    switch (opponent.value) {

        case "KI":
            gameDetails.mode = "ai";
            gameDetails.model = extraSelect.value;

            sessionStorage.setItem(
                "gameDetails",
                JSON.stringify(gameDetails)
            );

            location.href = "../";
            return;

        case "Lokal":
            gameDetails.mode = "lokal";
            gameDetails.vs = "";

            sessionStorage.setItem(
                "gameDetails",
                JSON.stringify(gameDetails)
            );

            location.href = "../";
            return;

        case "Freund":
        case "Öffentlich":
        case "Link":
            gameDetails.mode = "online";
            gameDetails.vs = "";

            sessionStorage.setItem(
                "gameDetails",
                JSON.stringify(gameDetails)
            );

            location.href = "./wait";
            return;
    }
};
</script>

</body>
</html>
