<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniChess</title>
    <link rel="icon" type="image/png" href="./src/img/icon.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./src/assets/bar/style.css">
    <script src="./src/assets/bar/script.js"></script>
</head>

<body class="dark">

<header id="topbar"></header>

<section class="hero">
    <h1>Omni Chess</h1>
    <h2>
        <span class="design-wheel">
            <span class="font-minecraft">DESIGN</span>
            <span class="font-nemoy">DESIGN</span>
            <span class="font-avara">DESIGN</span>
            <span class="font-melissa">DESIGN</span>
            <span class="font-chicle">DESIGN</span>
        </span>
        focused Schach-Website
    </h2><br>
    <a href="https://aiincer.github.io/chess/signup" class="cta-button">Account erstellen</a>
</section>

<section class="features">
    <div class="feature-card">
        <img src="./src/img/pages/index/lokal.png" alt="lokal">
        <h2 class="font-minecraft">lokal</h2>
        <p>spiele auf einem gerät gegen einen anderen Spieler</p>
    </div>
    <div class="feature-card">
        <img src="./src/img/pages/index/ai.png" alt="AI">
        <h2 class="font-minecraft">AI</h2>
        <p>fordere eines unserer KI-Modelle heraus</p>
    </div>
    <div class="feature-card">
        <img src="./src/img/pages/index/online.png" alt="online">
        <h2 class="font-minecraft">online</h2>
        <p>übe mit Online-Spielen gegen andere Nutzer</p>
    </div>
</section>

<footer>
    &copy; 2026 AIincer & OmniChess
</footer>
<script src="./script.js"></script>
<script type="module">
    import { loadBar } from "./api/bar.js";
    document.getElementById("topbar").innerHTML = loadBar(".");
</script>

</body>
</html>
